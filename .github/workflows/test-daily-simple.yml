name: Test Daily Simple

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up PowerShell
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh --version
      
      - name: Test PowerShell script
        run: |
          echo "Testing PowerShell script execution..."
          pwsh -Command "& ./scripts/Daily-GitHub-Surveillance.ps1 -Repository 'tunisiano187/Chocolatey-packages' -DaysBack 1 -Verbose"
          
      - name: Check for report
        run: |
          echo "Checking for surveillance report..."
          if [ -f "Daily-GitHub-Surveillance-Report.md" ]; then
            echo "Report found:"
            cat Daily-GitHub-Surveillance-Report.md
          else
            echo "No report found"
          fi