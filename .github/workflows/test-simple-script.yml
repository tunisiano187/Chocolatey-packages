name: Test Simple Script

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh --version
      
      - name: Test simple PowerShell script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Testing simple PowerShell script..."
          pwsh -Command "& ./scripts/test-surveillance-simple.ps1 -Repository 'tunisiano187/Chocolatey-packages' -DaysBack 1"
          
      - name: Check for report
        run: |
          echo "Checking for surveillance report..."
          if [ -f "Daily-GitHub-Surveillance-Report.md" ]; then
            echo "Report found:"
            cat Daily-GitHub-Surveillance-Report.md
          else
            echo "No report found"
          fi