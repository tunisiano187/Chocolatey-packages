name: Trigger AppVeyor build

# This workflow runs when one of the other GH Actions workflows finishes.
# Replace the names in "workflows" with the actual workflow names you care about
# (the `name:` field at the top of each .yml file).
# It only continues when the completed run succeeded, then calls the AppVeyor API
# to start a build.  You need to create a repository secret named
# `APPVEYOR_API_TOKEN` with a personal token from AppVeyor (Settings/Account).

on:
  workflow_run:
    workflows:
      - "CodeQL / Analyze (actions) (dynamic)"
      - "SonarQube Analysis"              # SonarCloud Code Analysis Completed in SonarQube Analysis / sonar (push)
      - "Package improver"               # Package improver / updater (push)
    types: [completed]

jobs:
  trigger-appveyor:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier les variables d'environnement
        run: |
          echo "APPEYOR_TOKEN=${{ env.APPVEYOR_TOKEN }}"
          echo "TOKEN_LENGTH=${#APPVEYOR_TOKEN}"
          echo "REFNAME=${GITHUB_REF##refs/heads/}"
      
      - name: Déclencher Build AppVeyor
        id: appveyor
        run: |
          curl -sS -w "\\nHTTP_CODE:%{http_code}\\n" \
          -X POST "https://ci.appveyor.com/api/projects/tunisiano187/Chocolatey-packages/build" \
          -H "Authorization: Bearer ${{ env.APPVEYOR_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "{\"branch\": \"${GITHUB_REF##refs/heads/}\"}" \
          > response.json
        
      - name: Analyser réponse
        if: steps.appveyor.outcomes.success
        env:
          APPVEYOR_CODE: ${{ env.PROJECT_URL }}
        run: |
          cat response.json
          echo "✅ Build déclenché avec succès !"
          echo "Branch: $BRANCH_NAME"
