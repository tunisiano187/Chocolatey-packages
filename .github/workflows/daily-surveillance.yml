name: Daily GitHub Issues Surveillance

on:
  schedule:
    # Run daily at 08:30 Europe/Brussels time (UTC+2, or UTC+1 during DST)
    # 08:30 Europe/Brussels = 06:30 UTC (standard time) or 07:30 UTC (daylight time)
    - cron: '30 6 * * *'  # 06:30 UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  surveillance:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run daily surveillance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting daily GitHub surveillance..."
          echo "Current time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Repository: ${{ github.repository }}"

          # Run the enhanced surveillance script
          python3 enhanced_surveillance.py

          echo "Daily surveillance completed"

      - name: Commit and push surveillance report
        run: |
          if [ -f "Daily-GitHub-Surveillance-Report.md" ] && [ -s "Daily-GitHub-Surveillance-Report.md" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

            git add "Daily-GitHub-Surveillance-Report.md"

            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              REPORT_DATE="$(date '+%Y-%m-%d')"
              REPORT_TIME="$(date '+%Y-%m-%d %H:%M:%S UTC')"
              git commit \
                --author="GitHub Action <action@github.com>" \
                -m "${REPORT_DATE}: Daily GitHub surveillance report" \
                -m "Automatic surveillance report generated at ${REPORT_TIME}. Contains: summary of open issues, priority categorization (critical/high/medium/low/normal), direct links to each issue, and statistical overview. Generated by Daily GitHub Issues Surveillance workflow." \
                -m "Co-authored-by: GitHub Action <action@github.com>"
              git push origin "$GITHUB_REF_NAME"
              echo "Report committed and pushed"
            fi
          else
            echo "No surveillance report generated"
          fi
