name: Daily GitHub Issues Surveillance

on:
  schedule:
    # Run daily at 08:30 Europe/Brussels time (UTC+2, or UTC+1 during DST)
    # 08:30 Europe/Brussels = 06:30 UTC (standard time) or 07:30 UTC (daylight time)
    - cron: '30 6 * * *'  # 06:30 UTC (adjust for DST as needed)
  workflow_dispatch:  # Allow manual triggering

jobs:
  surveillance:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up PowerShell
        uses: microsoft/setup-powershell@v1
        with:
          powershell-version: '7.x'
      
      - name: Run daily surveillance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "Starting daily GitHub surveillance..."
          Write-Host "Current time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss zzz')"
          Write-Host "Repository: ${{ github.repository }}"
          
          # Run the surveillance script
          & ./scripts/Daily-GitHub-Surveillance.ps1 `
            -Repository "${{ github.repository }}" `
            -GitHubToken "$env:GITHUB_TOKEN" `
            -DaysBack 1
          
          Write-Host "Daily surveillance completed"
      
      - name: Commit and push surveillance report
        run: |
          # Check if report file exists and has content
          if [ -f "Daily-GitHub-Surveillance-Report.md" ] && [ -s "Daily-GitHub-Surveillance-Report.md" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            
            # Add the report file
            git add "Daily-GitHub-Surveillance-Report.md"
            
            # Commit if there are changes
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "$(date '+%Y-%m-%d'): Daily GitHub surveillance report

              Automatic surveillance report generated on $(date '+%Y-%m-%d %H:%M:%S UTC')
              
              This commit contains:
              - Summary of new issues opened in the last 24h
              - Summary of pending pull requests
              - Priority categorization of critical items
              
              Generated by GitHub Actions daily surveillance workflow.

              Co-authored-by: GitHub Action <action@github.com>" \
                --author="GitHub Action <action@github.com>"
              
              git push origin main
              echo "Report committed and pushed successfully"
            fi
          else
            echo "No surveillance report file found or file is empty"
          fi
      
      - name: Create issue for critical findings
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if we have critical findings that need an issue
          if [ -f "Daily-GitHub-Surveillance-Report.md" ]; then
            # Look for critical issues in the report
            if grep -q "🔴 **critical**" "Daily-GitHub-Surveillance-Report.md"; then
              echo "Critical issues detected, creating GitHub issue..."
              
              # Create issue body
              ISSUE_BODY=$(cat <<'EOF'
              ## 🚨 Rapport de Surveillance Quotidien - Critiques Détectées

              Des **issues critiques** ont été détectés lors de la surveillance quotidienne du repository ${{ github.repository }}.

              ### 🔴 Issues Critiques Requérant une Attention Immédiate
              
              $(cat Daily-GitHub-Surveillance-Report.md | grep -A 10 "🔴 \*\*critical\*\*")

              ### Actions Recommandées
              - **Priorité élevée**: Répondre aux issues critiques dans les 24 heures
              - **Moyenne priorité**: Traiter les issues de haute priorité dans les 3 jours
              - **Surveillance continue**: Vérifier quotidiennement l'évolution des issues

              ### Prochaines Étapes
              1. Assigner les issues appropriées aux mainteneurs
              2. Mettre à jour le statut des issues quotidiennement
              3. Clore les une fois résolues

              ---
              *Ce rapport a été généré automatiquement par [GitHub Actions daily surveillance workflow](../../actions/runs/${{ github.run_id }}) à $(date '+%Y-%m-%d %H:%M:%S UTC')*
              EOF
              )
              
              # Create GitHub issue using gh CLI
              echo "$ISSUE_BODY" > /tmp/critical-issue-body.md
              gh issue create \
                --title "🚨 Surveillance Quotidienne - Issues Critiques $(date '+%Y-%m-%d')" \
                --body-file /tmp/critical-issue-body.md \
                --label "critical,bug,security,automation" \
                --assignee tunisiano187
              
              echo "Critical issue created successfully"
            else
              echo "No critical issues detected"
            fi
          fi
      
      - name: Comment on main surveillance issue
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Comment on the main surveillance issue (CHO-78) with surveillance summary
          if [ -f "Daily-GitHub-Surveillance-Report.md" ]; then
            # Create a summary comment
            COMMENT_BODY=$(cat <<'EOF'
            ## 📊 Rapport de Surveillance Quotidien $(date '+%Y-%m-%d')

            ### Résumé de la Surveillance
            $(cat Daily-GitHub-Surveillance-Report.md | head -20)

            ### Détails Complets
            Le rapport complet est disponible dans le commit: [$(git rev-parse HEAD)](../../commit/$(git rev-parse HEAD))

            ### Actions
            - 🔴 **Critique**: Requiert attention immédiate
            - 🟠 **Haute**: Priorité élevée
            - 🟡 **Moyenne**: À traiter bientôt
            - 🔵 **Basse**: Peut attendre
            - ⚪ **Normale**: Surveillance standard

            ---
            *Généré automatiquement par [GitHub Actions daily surveillance workflow](../../actions/runs/${{ github.run_id }})*
            EOF
            )
            
            # Find the main surveillance issue (CHO-3998) and comment on it
            # Note: This assumes the issue exists in the same repository
            gh issue comment 3998 --body "$COMMENT_BODY"
            echo "Comment posted to CHO-3998 surveillance issue"
          fi