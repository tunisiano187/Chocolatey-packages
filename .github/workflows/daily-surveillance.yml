name: Daily GitHub Issues Surveillance

on:
  schedule:
    # Run daily at 08:30 Europe/Brussels time (UTC+2, or UTC+1 during DST)
    # 08:30 Europe/Brussels = 06:30 UTC (standard time) or 07:30 UTC (daylight time)
    - cron: '30 6 * * *'  # 06:30 UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  surveillance:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run daily surveillance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Starting daily GitHub surveillance..."
          echo "Current time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Repository: ${{ github.repository }}"

          # Run the enhanced surveillance script
          python3 enhanced_surveillance.py

          echo "✅ Daily surveillance completed"

      - name: Commit and push surveillance report
        run: |
          if [ -f "Daily-GitHub-Surveillance-Report.md" ] && [ -s "Daily-GitHub-Surveillance-Report.md" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"

            git add "Daily-GitHub-Surveillance-Report.md"

            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "$(date '+%Y-%m-%d'): Daily GitHub surveillance report

Automatic surveillance report generated at $(date '+%Y-%m-%d %H:%M:%S UTC')

This report contains:
- Summary of open issues in the repository
- Priority categorization (critical, high, medium, low, normal)
- Direct links to each issue for quick access
- Statistical overview of issue distribution

Generated by Daily GitHub Issues Surveillance workflow.

Co-authored-by: GitHub Action <action@github.com>" \
                --author="GitHub Action <action@github.com>"

              git push origin $GITHUB_REF_NAME
              echo "✅ Report committed and pushed"
            fi
          else
            echo "No surveillance report generated"
          fi
