name: Daily GitHub Issues Surveillance

on:
  schedule:
    # Run daily at 08:30 Europe/Brussels time (UTC+2, or UTC+1 during DST)
    # 08:30 Europe/Brussels = 06:30 UTC (standard time) or 07:30 UTC (daylight time)
    - cron: '30 6 * * *'  # 06:30 UTC (adjust for DST as needed)
  workflow_dispatch:  # Allow manual triggering

jobs:
  surveillance:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up PowerShell
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh --version
      
      - name: Run daily surveillance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "Starting daily GitHub surveillance..."
          Write-Host "Current time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss zzz')"
          Write-Host "Repository: ${{ github.repository }}"
          
          # Run the enhanced surveillance script
          & ./scripts/test-surveillance-enhanced.ps1 `
            -Repository "${{ github.repository }}" `
            -GitHubToken "$env:GITHUB_TOKEN" `
            -DaysBack 1
          
          Write-Host "Daily surveillance completed"
      
      - name: Commit and push surveillance report
        run: |
          # Check if report file exists and has content
          if [ -f "Daily-GitHub-Surveillance-Report.md" ] && [ -s "Daily-GitHub-Surveillance-Report.md" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            
            # Add the report file
            git add "Daily-GitHub-Surveillance-Report.md"
            
            # Commit if there are changes
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "$(date '+%Y-%m-%d'): Daily GitHub surveillance report

              Automatic surveillance report generated on $(date '+%Y-%m-%d %H:%M:%S UTC')
              
              This commit contains:
              - Summary of new issues opened in the last 24h
              - Summary of pending pull requests
              - Priority categorization of critical items
              
              Generated by GitHub Actions daily surveillance workflow.

              Co-authored-by: GitHub Action <action@github.com>" \
                --author="GitHub Action <action@github.com>"
              
              git push origin $GITHUB_REF_NAME
              echo "Report committed and pushed successfully"
            fi
          else
            echo "No surveillance report file found or file is empty"
          fi
      
      - name: Create issue for critical findings
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if we have critical findings that need an issue
          if [ -f "Daily-GitHub-Surveillance-Report.md" ]; then
            # Enhanced check for critical issues based on enhanced report
            if grep -q "🔴 critical" "Daily-GitHub-Surveillance-Report.md"; then
              echo "Critical issues detected, creating GitHub issue..."
              
              # Extract critical issues from enhanced report
              CRITICAL_ISSUES=$(grep -A 20 "📊 Résumé par Priorité" "Daily-GitHub-Surveillance-Report.md" | grep "🔴 critical" -A 5 | head -10)
              
              # Create issue body
              ISSUE_BODY=$(cat <<'EOF'
              ## 🚨 Rapport de Surveillance Quotidien - Critiques Détectées

              Des **issues critiques** ont été détectés lors de la surveillance quotidienne du repository ${{ github.repository }}.

              ### 🔴 Issues Critiques Requérant une Attention Immédiate
              
              $CRITICAL_ISSUES

              ### 📊 Statistiques Critiques
              - **Issues critiques**: $(grep -o "🔴 critical: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')
              - **Issues hautes priorité**: $(grep -o "🟠 high: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')
              - **Total issues**: $(grep -o "Total issues: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')

              ### 🚀 Actions Recommandées
              - **🔴 Immédiate**: Répondre aux issues critiques dans les 24 heures
              - **🟠 Haute**: Traiter les issues de haute priorité dans les 3 jours
              - **🟡 Moyenne**: À traiter dans la semaine
              - **🔵 Basse**: Peut attendre 2 semaines
              - **⚪ Normale**: Suivi standard

              ### 📋 Prochaines Étapes
              1. **Analyser** chaque issue critique pour déterminer l'urgence
              2. **Assigner** les issues aux mainteneurs appropriés
              3. **Prioriser** en fonction de l'impact et de la fréquence
              4. **Suivre** l'évolution quotidiennement
              5. **Clôturer** une fois résolues

              ### 🔗 Liens Directs
              Rapport complet: [Daily-GitHub-Surveillance-Report.md](../../blob/$(git rev-parse HEAD)/Daily-GitHub-Surveillance-Report.md)
              Workflow: [GitHub Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

              ---
              *Ce rapport a été généré automatiquement par [GitHub Actions daily surveillance workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) à $(date '+%Y-%m-%d %H:%M:%S UTC')*
              EOF
              )
              
              # Create GitHub issue using gh CLI
              echo "$ISSUE_BODY" > /tmp/critical-issue-body.md
              gh issue create \
                --title "🚨 Surveillance Quotidienne - Critiques $(date '+%Y-%m-%d')" \
                --body-file /tmp/critical-issue-body.md \
                --label "bug,security,critical" \
                --assignee tunisiano187
              
              echo "Critical issue created successfully"
            else
              echo "No critical issues detected"
            fi
          fi
      
      - name: Check for critical issues flag
        if: always()
        run: |
          # Check if the PowerShell script flagged critical issues
          if [ -f "critical_issues_flag.txt" ]; then
            echo "CRITICAL_ISSUES_FLAG_FOUND" > /tmp/critical-flag-status.txt
            echo "Critical issues flag detected - will create issue"
          else
            echo "No critical issues flag found"
          fi
      
      - name: Comment on main surveillance issue
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Comment on the main surveillance issue (CHO-3998) with enhanced surveillance summary
          if [ -f "Daily-GitHub-Surveillance-Report.md" ]; then
            # Extract key metrics for enhanced comment
            TOTAL_ISSUES=$(grep -o "Total issues: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')
            CRITICAL_COUNT=$(grep -o "🔴 critical: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')
            HIGH_COUNT=$(grep -o "🟠 high: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')
            
            # Create enhanced summary comment
            COMMENT_BODY=$(cat <<'EOF'
            ## 📊 Rapport de Surveillance Quotidien $(date '+%Y-%m-%d')

            ### 📈 Statistiques Quotidiennes
            - **Total issues**: $TOTAL_ISSUES
            - **🔴 Critiques**: $CRITICAL_COUNT
            - **🟠 Hautes**: $HIGH_COUNT
            - **🟡 Moyennes**: $(grep -o "🟡 medium: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')
            - **🔵 Basses**: $(grep -o "🔵 low: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')
            - **⚪ Normales**: $(grep -o "⚪ normal: [0-9]*" "Daily-GitHub-Surveillance-Report.md" | cut -d: -f2 | tr -d ' ')

            ### 🚀 Issues Récentes
            $(cat Daily-GitHub-Surveillance-Report.md | grep "#" | head -5 | sed 's/^/    /')

            ### 📋 Actions Immédiates
            $(if [ "$CRITICAL_COUNT" -gt 0 ]; then echo "    🔴 **$CRITICAL_COUNT** issue(s) critique(s) requièrent attention immédiate"; fi)
            $(if [ "$HIGH_COUNT" -gt 0 ]; then echo "    🟠 **$HIGH_COUNT** issue(s) de haute priorité à traiter dans les 3 jours"; fi)
            $(if [ "$CRITICAL_COUNT" -eq 0 ] && [ "$HIGH_COUNT" -eq 0 ]; then echo "    ✅ Aucune issue critique ou haute priorité détectée aujourd'hui"; fi)

            ### 🔗 Liens Utiles
            - **Rapport complet**: [Daily-GitHub-Surveillance-Report.md](../../blob/$(git rev-parse HEAD)/Daily-GitHub-Surveillance-Report.md)
            - **Workflow**: [GitHub Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Repository Issues**: [Issues](${{ github.server_url }}/${{ github.repository }}/issues)

            ---
            *Généré automatiquement par [GitHub Actions daily surveillance workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) à $(date '+%Y-%m-%d %H:%M:%S UTC')*
            EOF
            )
            
            # Post comment on the main surveillance issue (CHO-3998)
            gh issue comment 3998 --body "$COMMENT_BODY"
            echo "Enhanced comment posted to CHO-3998 surveillance issue"
          fi